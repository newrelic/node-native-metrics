name: Prepare Release PR
# Reusable callee prep-release.yml declares its own contents/pull-requests write perms.
permissions:
  contents: read


on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Type of release. patch or minor (major if breaking)
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

jobs:
  release-notes:
    uses: newrelic/node-newrelic/.github/workflows/prep-release.yml@main
    with:
      release_type: ${{ github.event.inputs.release_type }}
      changelog_file: CHANGELOG.md
